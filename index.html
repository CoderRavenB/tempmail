<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail Pro | Geçici Email Servisi</title>
    <meta name="description" content="Ücretsiz, güvenli ve hızlı geçici email servisi.">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }

        /* 🌙 Karanlık Mod (Varsayılan) */
        :root[data-theme="dark"] {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --accent: #8b5cf6;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        /* ☀️ Aydınlık Mod */
        :root[data-theme="light"] {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #059669;
            --accent: #7c3aed;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --bg-light: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            /* Arka plan gradyanı */
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Üst Kısım ve Tema Butonu */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.2);
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Ana Grid Yapısı */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
            margin-bottom: 30px;
        }

        .card-glass {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* Email Görüntüleme Alanı */
        .email-display {
            background: var(--bg-light);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .email-display.has-email {
            background: var(--bg-card);
            border: 2px solid var(--secondary);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .email-text {
            font-size: 1.5rem;
            font-weight: 600;
            word-break: break-all;
            color: var(--text-primary);
        }

        /* Butonlar */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        
        .btn-success { background: var(--secondary); color: white; }
        .btn-secondary { background: var(--bg-light); color: var(--text-primary); border: 1px solid var(--border); }

        /* Form Elemanları */
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-main);
            color: var(--text-primary);
            margin-top: 8px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* İstatistikler */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        /* Gelen Kutusu */
        .email-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .email-item {
            background: var(--bg-light);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .email-item:hover { border-color: var(--primary); }
        .email-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .sender { font-weight: 600; }
        .time { font-size: 0.85rem; color: var(--text-secondary); }

        /* Bildirim (Toast) */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* Mobil Uyumluluk (Responsive) */
        @media (max-width: 850px) {
            .main-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .btn { width: 100%; }
            .logo-text { font-size: 2rem; }
            .email-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                <span id="themeIcon">☀️</span> Aydınlık Mod
            </button>
        </div>

        <div class="header">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <div class="logo-text">TempMail Pro</div>
            </div>
            <div class="tagline">Gelişmiş, modern ve güvenli geçici email çözümü</div>
        </div>

        <div class="main-grid">
            <div class="card-glass">
                <h2 style="font-size: 1.5rem; margin-bottom: 10px;">🎯 Email Üretici</h2>
                
                <div class="email-display" id="emailDisplay">
                    <div style="color: var(--text-secondary)">
                        <div style="font-size: 2.5rem; margin-bottom: 10px;">📧</div>
                        <div>Güvenli email oluşturmak için butona tıklayın</div>
                    </div>
                </div>
                
                <div class="controls">
                    <button class="btn btn-primary" onclick="generateEmail()">⚡ Hızlı Oluştur</button>
                    <button class="btn btn-success" onclick="copyEmail()" id="copyBtn" style="display: none;">📋 Kopyala</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="card-glass" style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px;">⚙️ Ayarlar</h3>
                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 0.9rem; color: var(--text-secondary);">Mail Sağlayıcısı:</label>
                        <select id="domainSelect">
                            <option value="tempmail.pro">@tempmail.pro</option>
                            <option value="quickmail.dev">@quickmail.dev</option>
                            <option value="anonmail.xyz">@anonmail.xyz</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; color: var(--text-secondary);">Özel İsim (Opsiyonel):</label>
                        <input type="text" id="customPrefix" placeholder="örn: proje_test">
                    </div>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card-glass stat-card">
                <div class="stat-number" id="generatedCount">0</div>
                <div style="color: var(--text-secondary); margin-top: 5px;">Oluşturulan</div>
            </div>
            <div class="card-glass stat-card">
                <div class="stat-number" id="receivedCount" style="color: var(--secondary)">0</div>
                <div style="color: var(--text-secondary); margin-top: 5px;">Gelen Mesaj</div>
            </div>
            <div class="card-glass stat-card">
                <div class="stat-number" id="activeTime" style="color: var(--accent)">00:00</div>
                <div style="color: var(--text-secondary); margin-top: 5px;">Aktif Süre</div>
            </div>
        </div>

        <div class="card-glass" id="inboxSection" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <h3 style="display: flex; align-items: center; gap: 8px;">📨 Gelen Kutusu</h3>
                <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;" onclick="refreshInbox()">🔄 Yenile</button>
            </div>
            
            <div class="email-list" id="emailList">
                </div>
        </div>
    </div>

    <div class="toast" id="toast">İşlem başarılı!</div>

    <script>
        // Tema Yönetimi
        function toggleTheme() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            const toggleBtn = document.getElementById('themeToggle');
            
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                toggleBtn.innerHTML = '<span id="themeIcon">🌙</span> Karanlık Mod';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                toggleBtn.innerHTML = '<span id="themeIcon">☀️</span> Aydınlık Mod';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Sayfa yüklendiğinde temayı kontrol et
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                if (savedTheme === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    document.getElementById('themeToggle').innerHTML = '<span id="themeIcon">🌙</span> Karanlık Mod';
                }
            }
        };

        // Mevcut TempMail JS Mantığı
        let currentEmail = '';
        let emailCount = 0;
        let receivedCount = 0;
        let startTime = null;

        function generateEmail() {
            const domain = document.getElementById('domainSelect').value;
            const prefix = document.getElementById('customPrefix').value.trim() || Math.random().toString(36).substring(2, 10);
            currentEmail = `${prefix}@${domain}`;
            
            const display = document.getElementById('emailDisplay');
            display.innerHTML = `<div class="email-text">${currentEmail}</div>`;
            display.classList.add('has-email');
            
            document.getElementById('copyBtn').style.display = 'flex';
            document.getElementById('inboxSection').style.display = 'block';
            
            emailCount++;
            document.getElementById('generatedCount').textContent = emailCount;
            
            if (!startTime) {
                startTime = new Date();
                setInterval(updateTimer, 1000);
            }
            
            showToast('Yeni email adresi oluşturuldu!');
            
            // Simülasyon: 3 saniye sonra mail gelsin
            setTimeout(simulateEmail, 3000);
        }

        function copyEmail() {
            navigator.clipboard.writeText(currentEmail);
            showToast('Email panoya kopyalandı!');
        }

        function updateTimer() {
            const diff = new Date() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('activeTime').textContent = `${m}:${s}`;
        }

        function simulateEmail() {
            const list = document.getElementById('emailList');
            const div = document.createElement('div');
            div.className = 'email-item';
            div.innerHTML = `
                <div class="email-header">
                    <span class="sender">GitHub Security</span>
                    <span class="time">Az önce</span>
                </div>
                <div style="font-weight: 500; margin-bottom: 5px;">Hesap Doğrulama</div>
                <div style="font-size: 0.9rem; color: var(--text-secondary);">Yeni cihaz girişinizi onaylamak için tıklayın...</div>
            `;
            list.prepend(div);
            
            receivedCount++;
            document.getElementById('receivedCount').textContent = receivedCount;
            showToast('Yeni bir mesajınız var!');
        }

        function refreshInbox() {
            showToast('Gelen kutusu güncellendi!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
